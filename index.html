    <title>Rock Paper Scissors</title>
</head>
<body>
    <script>
        function getComputerChoice(max){
            return Math.floor(Math.random()*max); 
        }

        let computerChoice = getComputerChoice(3)

        if (computerChoice === 2){
            console.log("Rock")
        }
        if (computerChoice === 1){
            console.log("Paper")
        }
        if (computerChoice === 0){
            console.log("Scissors")
        }
